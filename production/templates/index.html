<!DOCTYPE html>
<html lang="en">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dirt-O-Meter + LiDAR 360° Sector View</title>
 
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
 
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'DM Sans', Arial, sans-serif;
      color: #1a1d23;
      padding: 20px;
    }

    .dashboard {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 16px;
      width: 100%;
      height: 100%;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      min-width: 0;
    }

    .gauge-card { flex: 1; }
    .radar-card { flex: 2; }
    .pointcloud-card { flex: 2; align-items: flex-start; }

    .header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }

    .title { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; }
    .subtitle { font-size: 12px; color: #7a8090; margin-top: 4px; }

    .gauge-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    #gauge { display: block; max-width: 100%; }

    .readout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      margin-bottom: 4px;
      width: 100%;
    }

    .pct {
      font-family: 'DM Mono', monospace;
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -2px;
    }

    .pill {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
    }

    .instance {
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #7a8090;
      text-align: center;
    }

    .divider { width: 100%; height: 1px; background: #eef0f4; margin: 16px 0 14px; }

    .feature-toggle {
      width: 100%; background: #f8fafc; border: 1px solid #eef0f4; border-radius: 16px;
      padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    .toggle-copy { display: flex; flex-direction: column; gap: 2px; }
    .toggle-title { font-size: 11px; font-weight: 700; color: #111827; text-transform: uppercase; letter-spacing: 0.7px; }

    .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-slider {
      position: absolute; cursor: pointer; inset: 0; background: #d1d5db; transition: 0.2s; border-radius: 999px;
    }
    .switch-slider::before {
      content: ""; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px;
      background: #ffffff; transition: 0.2s; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }
    .switch input:checked + .switch-slider { background: #111827; }
    .switch input:checked + .switch-slider::before { transform: translateX(20px); }

    #radar { display: block; max-width: 100%; }

    .radar-status {
      margin-top: 12px; font-size: 13px; font-weight: 600; text-align: center; padding: 8px 14px;
      border-radius: 999px; background: #f8fafc; color: #334155; width: 100%;
    }

    .radar-summary { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .summary-box { background: #f8fafc; border: 1px solid #eef0f4; border-radius: 14px; padding: 10px; text-align: center; }
    .summary-box span { display: block; font-size: 10px; color: #7a8090; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    .summary-box strong { font-family: 'DM Mono', monospace; font-size: 15px; color: #1a1d23; }

    .sector-grid { width: 100%; display: grid; gap: 8px; margin-top: 12px; }
    .sector-item {
      background: #ffffff; border: 1px solid #eef0f4; border-radius: 12px; padding: 8px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px;
    }
    .sector-item .name { font-weight: 600; color: #374151; }
    .sector-item .value { font-family: 'DM Mono', monospace; color: #111827; }

    @media (max-width: 900px) {
      body { height: auto; overflow: auto; padding: 16px; }
      .dashboard { flex-direction: column; height: auto; }
      .gauge-card, .radar-card, .pointcloud-card { flex: none; width: 100%; }
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <div class="card gauge-card">
      <div class="header">
        <div class="title">Dirt-O-Meter</div>
        <div class="subtitle">Average LiDAR sector dirtiness</div>
      </div>

      <div class="gauge-wrap">
        <canvas id="gauge"></canvas>
      </div>

      <div class="readout">
        <div class="pct" id="pctText">0%</div>
        <div class="pill" id="pill">Clean</div>
        <div class="instance" id="instanceText">Waiting for data</div>
      </div>

      <div class="divider"></div>

      <div class="feature-toggle">
        <div class="toggle-copy">
          <div class="toggle-title">Rock Mode</div>
        </div>
        <label class="switch" aria-label="Toggle Junior Minor rock mode">
          <input type="checkbox" id="juniorMinorToggle" />
          <span class="switch-slider"></span>
        </label>
      </div>
      <div class="rock-display" id="rockDisplay" style="display:none; margin-top: 20px; text-align: center;">
        <img id="rockImage" src="" alt="Rock status" style="width: 80%; border-radius: 12px; object-fit: contain;" />
      </div>
    </div>

    <div class="card radar-card">
      <div class="header">
        <div class="title">LiDAR 360° Sector View</div>
        <div class="subtitle">Striped grey area shows dirty portion of each sector</div>
      </div>

      <canvas id="radar"></canvas>

      <div class="radar-status" id="radarStatus">Waiting for sector data</div>

      <div class="radar-summary">
        <div class="summary-box">
          <span>Dirtiest Sector</span>
          <strong id="dirtiestSector">-</strong>
        </div>
        <div class="summary-box">
          <span>Critical Sectors</span>
          <strong id="criticalCount">0 / 0</strong>
        </div>
      </div>

      <div class="sector-grid" id="sectorGrid">
        </div>
    </div>

    <div class="card pointcloud-card">
      <div class="header">
        <div class="title">3D Point Cloud</div>
        <div class="subtitle">Live LiDAR view · 30 cm radius</div>
      </div>
      <div id="pointcloudContainer" style="flex:1; width:100%; border-radius:12px; overflow:hidden;"></div>
    </div>
  </div>

  <script>
    // ── Configuration constants ─────────────────────────────────────────────────
// Change this line (around line 250)
    const DATA_ENDPOINT = '/api/data';    const POLL_INTERVAL_MS       = 200;               // Polling rate for both radar and PC

    const CRITICAL_DIRT_PERCENT  = 80;
    const WARNING_DIRT_PERCENT   = 30;
    const OVERALL_DIRTINESS_MODE = 'average';
    const ANIMATION_DURATION_MS  = 150;

    const ASSET_PATHS = {
      happy:   "{{ url_for('static', filename='sound/happyrock.jpg') }}",
      mid:     "{{ url_for('static', filename='sound/midrock.jpg') }}",
      sus:     "{{ url_for('static', filename='sound/susrock.jpg') }}",
      blocked: "{{ url_for('static', filename='sound/blocked.mp3') }}"
    };

    // ── Gauge setup ─────────────────────────────────────────────────────────────
    const W          = Math.min(260, window.innerWidth * 0.18);
    const SIDE_PAD   = 22;
    const LABEL_MARGIN = 20;
    const BOTTOM_PAD = 20;
    const R          = W / 2 - SIDE_PAD;
    const CX         = W / 2;
    const H          = LABEL_MARGIN + R + BOTTOM_PAD;
    const CY         = LABEL_MARGIN + R;

    const canvas = document.getElementById('gauge');
    const ctx    = canvas.getContext('2d');
    canvas.width  = W;
    canvas.height = H;

    const C_GREEN  = { r: 34,  g: 197, b: 94  };
    const C_YELLOW = { r: 245, g: 158, b: 11  };
    const C_RED    = { r: 239, g: 68,  b: 68  };

    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }

    function lerpRGB(a, b, t) {
      return { r: Math.round(a.r + (b.r - a.r) * t), g: Math.round(a.g + (b.g - a.g) * t), b: Math.round(a.b + (b.b - a.b) * t) };
    }

    function gradientColor(t) {
      const c = t <= 0.5 ? lerpRGB(C_GREEN, C_YELLOW, t / 0.5) : lerpRGB(C_YELLOW, C_RED, (t - 0.5) / 0.5);
      return `rgb(${c.r},${c.g},${c.b})`;
    }

    function getValueColor(v)  { return gradientColor(v / 100); }
    function getPillStyle(v) {
      if (v < 30) return { bg: '#dcfce7', fg: '#15803d', label: 'Clean' };
      if (v < 70) return { bg: '#fef3c7', fg: '#b45309', label: 'Partially Dirty' };
      return           { bg: '#fee2e2', fg: '#b91c1c', label: 'Very Dirty' };
    }
    const GAUGE_MAX = 50;
    function valueToAngle(v) { return Math.PI * (1 - v / GAUGE_MAX); }

    const TICK_COUNT = 101, TICK_LEN = 13, TICK_GAP = 2, TICK_W_ON = 3.5, TICK_W_OFF = 2, LABEL_DIST = R + 16;

    function drawGauge(value) {
      ctx.clearRect(0, 0, W, H);
      for (let i = 0; i < TICK_COUNT; i++) {
        const t = i / (TICK_COUNT - 1);
        const tickValue = t * GAUGE_MAX;
        const angle = valueToAngle(tickValue);
        const active = tickValue <= Math.min(value, GAUGE_MAX);
        const cosA = Math.cos(angle), sinA = -Math.sin(angle);
        ctx.beginPath();
        ctx.moveTo(CX + (R - TICK_GAP) * cosA, CY + (R - TICK_GAP) * sinA);
        ctx.lineTo(CX + (R - TICK_GAP - TICK_LEN) * cosA, CY + (R - TICK_GAP - TICK_LEN) * sinA);
        ctx.lineWidth = active ? TICK_W_ON : TICK_W_OFF;
        ctx.lineCap = 'round';
        ctx.strokeStyle = active ? gradientColor(t) : '#dde1e9';
        ctx.stroke();
      }
      ctx.font = '500 10.5px "DM Sans", Arial, sans-serif';
      ctx.fillStyle = '#9aa0ae';
      ctx.textBaseline = 'middle';
      [{ v: 0, text: '0' }, { v: 12.5, text: '12' }, { v: 25, text: '25' }, { v: 37.5, text: '37' }, { v: 50, text: '50' }].forEach(({ v, text }) => {
        ctx.textAlign = v === 25 ? 'center' : v < 25 ? 'right' : 'left';
        ctx.fillText(text, CX + LABEL_DIST * Math.cos(angle), CY - LABEL_DIST * Math.sin(angle));
      });
    }
 
    const pctText = document.getElementById('pctText'), pill = document.getElementById('pill'), instanceText = document.getElementById('instanceText');

    // ── Radar setup ─────────────────────────────────────────────────────────────
    const radarCanvas = document.getElementById('radar');
    const radarCtx    = radarCanvas.getContext('2d');
    const RADAR_SIZE = Math.min(300, window.innerWidth * 0.22);
    const RADAR_W = RADAR_SIZE, RADAR_H = RADAR_SIZE + 30;
    const RADAR_CX = RADAR_W / 2, RADAR_CY = RADAR_H / 2, RADAR_RADIUS = RADAR_SIZE * 0.45, RADAR_START_DEG = -90;

    radarCanvas.width = RADAR_W; radarCanvas.height = RADAR_H;
    const radarStatus = document.getElementById('radarStatus'), dirtiestSectorEl = document.getElementById('dirtiestSector'), criticalCountEl = document.getElementById('criticalCount');
    const sectorGrid = document.getElementById('sectorGrid');

    function degToRad(deg) { return deg * Math.PI / 180; }
    function percentToCleanRadius(dirtPercent) { return RADAR_RADIUS * (1 - clamp(dirtPercent, 0, 100) / 100); }

    function createBlockedPattern() {
      const pc = document.createElement('canvas'), pctx = pc.getContext('2d');
      pc.width = 10; pc.height = 10; pctx.fillStyle = '#dde2e8'; pctx.fillRect(0, 0, 10, 10);
      pctx.strokeStyle = '#bcc4cf'; pctx.lineWidth = 1.4; pctx.lineCap = 'round';
      [[1,8,4,5],[6,8,9,5],[1,3,4,0],[6,3,9,0]].forEach(([x1,y1,x2,y2]) => { pctx.beginPath(); pctx.moveTo(x1,y1); pctx.lineTo(x2,y2); pctx.stroke(); });
      return radarCtx.createPattern(pc, 'repeat');
    }
    const blockedPattern = createBlockedPattern();

    function normalizeSectorValues(values) {
      if (!Array.isArray(values)) return [];
      return values.map(v => clamp(Number(v) || 0, 0, 100));
    }

    function calculateOverallDirtiness(sectorValues) {
      if (!sectorValues.length) return 0;
      if (OVERALL_DIRTINESS_MODE === 'max') return Math.max(...sectorValues);
      return sectorValues.reduce((sum, v) => sum + v, 0) / sectorValues.length;
    }

    function createSegmentsFromSectorValues(sectorValues) {
      const nSectors = sectorValues.length || 1;
      const sectorSizeDeg = 360 / nSectors;
      return sectorValues.map((dirtPercent, index) => ({
        name: `S${index + 1}`, index,
        startDeg: RADAR_START_DEG + index * sectorSizeDeg,
        endDeg: RADAR_START_DEG + (index + 1) * sectorSizeDeg,
        dirtPercent
      }));
    }

    function drawSectorRing(startRad, endRad, innerR, outerR, fill) {
      if (outerR <= innerR) return;
      radarCtx.beginPath(); radarCtx.arc(RADAR_CX, RADAR_CY, outerR, startRad, endRad);
      radarCtx.arc(RADAR_CX, RADAR_CY, innerR, endRad, startRad, true);
      radarCtx.closePath(); radarCtx.fillStyle = fill; radarCtx.fill();
    }

    function drawFullSector(startRad, endRad, fill) {
      radarCtx.beginPath(); radarCtx.moveTo(RADAR_CX, RADAR_CY); radarCtx.arc(RADAR_CX, RADAR_CY, RADAR_RADIUS, startRad, endRad);
      radarCtx.closePath(); radarCtx.fillStyle = fill; radarCtx.fill();
    }

    function drawSegmentBase(segment) {
      const startRad = degToRad(segment.startDeg), endRad = degToRad(segment.endDeg);
      drawFullSector(startRad, endRad, '#ffffff');
      if (segment.dirtPercent >= 99.9) drawFullSector(startRad, endRad, blockedPattern);
      else if (segment.dirtPercent > 0) drawSectorRing(startRad, endRad, percentToCleanRadius(segment.dirtPercent), RADAR_RADIUS, blockedPattern);
    }

    function drawRangeRings() {
      radarCtx.save(); radarCtx.strokeStyle = 'rgba(148, 163, 184, 0.40)'; radarCtx.lineWidth = 1.15;
      [25, 50, 75, 100].forEach(pct => { radarCtx.beginPath(); radarCtx.arc(RADAR_CX, RADAR_CY, RADAR_RADIUS * (pct / 100), 0, Math.PI * 2); radarCtx.stroke(); });
      radarCtx.restore();
    }

    function drawSegmentDividerLines(nSectors) {
      if (!nSectors) return;
      radarCtx.save(); radarCtx.strokeStyle = '#d8dee9'; radarCtx.lineWidth = 2; radarCtx.lineCap = 'round';
      const sectorSizeDeg = 360 / nSectors;
      for (let i = 0; i < nSectors; i++) {
        const angle = degToRad(RADAR_START_DEG + i * sectorSizeDeg);
        radarCtx.beginPath(); radarCtx.moveTo(RADAR_CX, RADAR_CY);
        radarCtx.lineTo(RADAR_CX + Math.cos(angle) * RADAR_RADIUS, RADAR_CY + Math.sin(angle) * RADAR_RADIUS);
        radarCtx.stroke();
      }
      radarCtx.restore();
    }

    function drawOuterCircle() {
      radarCtx.save(); radarCtx.beginPath(); radarCtx.arc(RADAR_CX, RADAR_CY, RADAR_RADIUS, 0, Math.PI * 2);
      radarCtx.lineWidth = 2; radarCtx.strokeStyle = '#d8dee9'; radarCtx.stroke(); radarCtx.restore();
    }

    function drawPercentLabels() {
      radarCtx.save(); radarCtx.font = '600 9px "DM Sans", Arial, sans-serif'; radarCtx.fillStyle = '#8b95a5';
      radarCtx.textBaseline = 'middle'; radarCtx.textAlign = 'left';
      [25, 50, 75, 100].forEach(pct => { radarCtx.fillText(`${pct}%`, RADAR_CX + 6, RADAR_CY - RADAR_RADIUS * (pct / 100) + 9); });
      radarCtx.restore();
    }

    function drawCenterSensor() {
      radarCtx.save(); radarCtx.beginPath(); radarCtx.arc(RADAR_CX, RADAR_CY, 22, 0, Math.PI * 2);
      radarCtx.fillStyle = '#ffffff'; radarCtx.fill(); radarCtx.lineWidth = 2; radarCtx.strokeStyle = '#d8dee9'; radarCtx.stroke();
      radarCtx.beginPath(); radarCtx.arc(RADAR_CX, RADAR_CY, 5, 0, Math.PI * 2); radarCtx.fillStyle = '#1f2937'; radarCtx.fill();
      radarCtx.font = '600 8px "DM Sans", Arial, sans-serif'; radarCtx.fillStyle = '#64748b'; radarCtx.textAlign = 'center';
      radarCtx.textBaseline = 'middle'; radarCtx.fillText('LiDAR', RADAR_CX, RADAR_CY + 14); radarCtx.restore();
    }

    function drawSectorNumbers(segments) {
      radarCtx.save(); radarCtx.font = '700 10px "DM Sans", Arial, sans-serif'; radarCtx.fillStyle = '#475569';
      radarCtx.textAlign = 'center'; radarCtx.textBaseline = 'middle';
      segments.forEach(seg => {
        const midDeg = (seg.startDeg + seg.endDeg) / 2, labelRadius = RADAR_RADIUS + 16;
        radarCtx.fillText(seg.name, RADAR_CX + Math.cos(degToRad(midDeg)) * labelRadius, RADAR_CY + Math.sin(degToRad(midDeg)) * labelRadius);
      });
      radarCtx.restore();
    }

    function drawRadar(segments) {
      radarCtx.clearRect(0, 0, RADAR_W, RADAR_H);
      segments.forEach(drawSegmentBase); drawRangeRings(); drawSegmentDividerLines(segments.length);
      drawOuterCircle(); drawPercentLabels(); drawCenterSensor(); drawSectorNumbers(segments);
    }

    function updateRadarInfo(segments) {
      const nSectors = segments.length;
      if (!nSectors) return;

      const dirtValues = segments.map(s => s.dirtPercent);
      const maxDirt = Math.max(...dirtValues);
      const criticalCount = dirtValues.filter(v => v >= CRITICAL_DIRT_PERCENT).length;

      dirtiestSectorEl.textContent = `S${dirtValues.indexOf(maxDirt) + 1} · ${maxDirt.toFixed(1)}%`;
      criticalCountEl.textContent  = `${criticalCount} / ${nSectors}`;

      sectorGrid.style.gridTemplateColumns = `repeat(${nSectors}, 1fr)`;
      sectorGrid.innerHTML = '';
      dirtValues.forEach((val, i) => {
        const item = document.createElement('div');
        item.className = 'sector-item';
        item.innerHTML = `<span class="name">S${i + 1}</span><span class="value">${val.toFixed(1)}%</span>`;
        sectorGrid.appendChild(item);
      });

      if (criticalCount > 0) {
        radarStatus.textContent = 'Critical dirt level detected'; radarStatus.style.background = '#fee2e2'; radarStatus.style.color = '#b91c1c';
      } else if (maxDirt >= WARNING_DIRT_PERCENT) {
        radarStatus.textContent = 'Sensor level elevated'; radarStatus.style.background = '#fef3c7'; radarStatus.style.color = '#b45309';
      } else {
        radarStatus.textContent = 'Sensor levels mostly clean'; radarStatus.style.background = '#dcfce7'; radarStatus.style.color = '#15803d';
      }
    }

    // ── Rock overlay (Sus Rock only) ────────────────────────────────────────────
    const rockDisplay = document.getElementById('rockDisplay'), rockImage = document.getElementById('rockImage');
    const juniorMinorToggle = document.getElementById('juniorMinorToggle'), blockedAlertSound = new Audio(ASSET_PATHS.blocked);
    blockedAlertSound.volume = 0.75;
    let juniorMinorEnabled = false, soundEnabled = false, wasCritical = false;

    async function unlockBlockedSound() {
      try {
        blockedAlertSound.currentTime = 0; blockedAlertSound.muted = true;
        await blockedAlertSound.play(); blockedAlertSound.pause(); blockedAlertSound.currentTime = 0; blockedAlertSound.muted = false;
      } catch (e) {}
    }

    function updateRockStatus(segments) {
      if (!juniorMinorEnabled) { rockDisplay.style.display = 'none'; wasCritical = false; return; }
      if (!segments.length) return;
      const maxDirt = Math.max(...segments.map(s => s.dirtPercent));
      rockDisplay.style.display = 'block';
      if (maxDirt >= CRITICAL_DIRT_PERCENT) {
        rockImage.src = ASSET_PATHS.sus;
        if (!wasCritical && soundEnabled) blockedAlertSound.play().catch(()=>{});
        wasCritical = true;
      } else if (maxDirt >= WARNING_DIRT_PERCENT) { rockImage.src = ASSET_PATHS.mid; wasCritical = false;
      } else { rockImage.src = ASSET_PATHS.happy; wasCritical = false; }
    }

    juniorMinorToggle.addEventListener('change', async () => {
      juniorMinorEnabled = juniorMinorToggle.checked; soundEnabled = juniorMinorEnabled; wasCritical = false;
      if (juniorMinorEnabled) { await unlockBlockedSound(); updateRockStatus(createSegmentsFromSectorValues(currentSectorValues)); }
      else { rockDisplay.style.display = 'none'; blockedAlertSound.pause(); blockedAlertSound.currentTime = 0; }
    });

    // ── Core data + animation ───────────────────────────────────────────────────
    let currentSectorValues = [];
    let animationFrameId    = null;

    function updateRadarFromSectorValues(sectorValues) {
      const segments = createSegmentsFromSectorValues(sectorValues);
      drawRadar(segments);
      updateRadarInfo(segments);
      return segments;
    }

    function applySectorValues(values) {
      const sectorValues = normalizeSectorValues(values);
      currentSectorValues = sectorValues;
      const overallValue = calculateOverallDirtiness(sectorValues);
      const roundedValue = Math.round(overallValue);
      drawGauge(overallValue);
      pctText.textContent = roundedValue + '%';
      pctText.style.color = getValueColor(overallValue);
      const ps = getPillStyle(roundedValue);
      pill.textContent = ps.label; pill.style.background = ps.bg; pill.style.color = ps.fg;
      updateRockStatus(updateRadarFromSectorValues(sectorValues));
    }

    function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }

    function animateToSectorValues(targetValues) {
      const cleanTarget = normalizeSectorValues(targetValues);
      if (cleanTarget.length !== currentSectorValues.length) { applySectorValues(cleanTarget); return; } // Snap on reshape
      const startValues = currentSectorValues.slice(), startTime = performance.now();
      if (animationFrameId !== null) cancelAnimationFrame(animationFrameId);

      function step(now) {
        const progress = Math.min((now - startTime) / ANIMATION_DURATION_MS, 1);
        applySectorValues(cleanTarget.map((target, i) => startValues[i] + (target - startValues[i]) * easeInOutCubic(progress)));
        if (progress < 1) animationFrameId = requestAnimationFrame(step);
        else { applySectorValues(cleanTarget); animationFrameId = null; }
      }
      animationFrameId = requestAnimationFrame(step);
    }

    // ── 3D Point Cloud viewer ───────────────────────────────────────────────────
    const DISPLAY_RADIUS_M = 0.30;
    function initPointCloud() {
      const container = document.getElementById('pointcloudContainer');
      if (!container.clientWidth || !container.clientHeight) { requestAnimationFrame(initPointCloud); return; }
      const scene = new THREE.Scene(); scene.background = new THREE.Color(0xf8fafc);
      const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.001, 10);
      camera.position.set(0.3, 0.42, 0.3); camera.lookAt(0, 0, 0);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight); renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);
      scene.add(new THREE.GridHelper(0.6, 12, 0x94a3b8, 0xdde1e9));
      scene.add(new THREE.Mesh(new THREE.SphereGeometry(0.005, 8, 8), new THREE.MeshBasicMaterial({ color: 0x6366f1 })));

      function makePointCloud(color) {
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0, -999, 0]), 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color, size: 4, sizeAttenuation: false }));
        scene.add(pts); return pts;
      }
      const cleanPts = makePointCloud(0x111827), dirtyPts = makePointCloud(0xef4444);

      function updatePointCloud(pointsObj, points) {
        const arr = new Float32Array(points.length > 0 ? points.length * 3 : 3);
        if (points.length === 0) { arr[0] = 0; arr[1] = -999; arr[2] = 0; }
        else {
          for (let i = 0; i < points.length; i++) {
            const [rx, ry, rz] = points[i];
            arr[i * 3] = rx; arr[i * 3 + 1] = rz; arr[i * 3 + 2] = -ry;
          }
        }
        pointsObj.geometry.setAttribute('position', new THREE.BufferAttribute(arr, 3));
        pointsObj.geometry.attributes.position.needsUpdate = true;
        pointsObj.geometry.computeBoundingSphere();
      }

      window.updatePointClouds = function(clean, dirty) {
        updatePointCloud(cleanPts, clean); updatePointCloud(dirtyPts, dirty);
      };

      function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
      animate();
    }
    requestAnimationFrame(initPointCloud);

    // ── Unified Backend communication ───────────────────────────────────────────
    async function fetchAndUpdateAll() {
      try {
        const res  = await fetch(DATA_ENDPOINT);
        const data = await res.json();

        // Flexibly parse the structure
        const keys = Object.keys(data);
        const sectors = data.sectors || data.dirty_perc_in_sectors || data[keys[0]];
        const dirtyPts = data.dirty || data.coords_dirty_points || data[keys[1]];
        const cleanPts = data.clean || data.coords_clean_points || data[keys[2]];

        if (Array.isArray(sectors) || (sectors && sectors.length !== undefined)) {
          animateToSectorValues(Array.from(sectors));
          instanceText.textContent = 'Live tracking';
        }
        if (window.updatePointClouds && dirtyPts && cleanPts) {
          window.updatePointClouds(cleanPts, dirtyPts);
        }
      } catch (e) {
        // Silently wait for backend
      }
    }

    // ── Boot ────────────────────────────────────────────────────────────────────
    applySectorValues([]);
    setInterval(fetchAndUpdateAll, POLL_INTERVAL_MS);
  </script>
</body>
